<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone GeoJSON Reviewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Stone GeoJSON Reviewer</h1>
    <div id="map"></div>
    <div id="controls">
        <button id="prevBtn">Previous</button>
        <button id="toggleReviewedBtn">Mark as Reviewed / Not Reviewed</button>
        <button id="nextBtn">Next</button>
    </div>
    <div id="featureInfo">
        <p>Current Feature ID: <span id="currentFeatureId"></span></p>
        <p>Current Feature Status: <span id="currentFeatureStatus"></span></p>
        <pre id="featureProperties"></pre>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap" async defer></script>
    <script src="script.js"></script>
</body>
</html>
